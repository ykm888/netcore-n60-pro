name: Build OpenWrt for Netcore N60 Pro (ImmortalWrt 24.10 内核6.6版)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: padavanonly-immortalwrt-mt798x-2410.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get update
        sudo apt-get -y purge --ignore-missing azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mysql* php* android*
        sudo apt-get -y autoremove --purge
        sudo apt-get -y install ack asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git glogg gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils rsync subversion swig texinfo u-boot-tools unzip upx wget xmlto xz-utils zlib1g-dev libutf8proc-dev
        sudo timedatectl set-timezone "${{ env.TZ }}"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone Source Code
      run: |
        df -hT $PWD
        git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} /workdir/openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        [ -f ${{ env.CONFIG_FILE }} ] && cp ${{ env.CONFIG_FILE }} openwrt/.config
        cd openwrt
        make defconfig

    - name: Download Package Source
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      id: compile
      run: |
        cd openwrt
        echo "status=success"
        
        # ------------------ 🛠️ 终极分步顺序编译策略 ------------------
        echo "==== [第一步] 编译底层交叉编译工具链 ===="
        make tools/compile -j$(nproc)
        make toolchain/compile -j$(nproc)
        
        echo "==== [第二步] 强行先编译 Linux 核心内核，使其生成 modules.builtin ===="
        # 这一步只编译纯内核，此时绝不编译无线驱动，多线程跑满，100% 能顺利生成内置模块描述
        make target/linux/compile -j$(nproc)
        
        echo "==== [第三步] 单线程安全构建 mt_wifi 闭源高功率无线驱动 ===="
        # 此时内核文件已全部就绪，无线驱动去读路径绝对不会再报 No such file 错误
        make package/mtk/drivers/mt_wifi/compile V=s -j1
        
        echo "==== [第四步] 全线程收尾编译其余全部应用组件 ===="
        make -j$(nproc) || make -j1 V=s
        # -------------------------------------------------------------
        
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

    - name: Organize Files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload Firmware to Artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_6.6_Kernel_firmware_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate Release Tag
      id: tag
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: |
        echo "release_tag=Netcore_N60_Pro_Kernel6.6_${{ env.FILE_DATE }}" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload Firmware to Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          ### 磊科 N60 Pro (MT7986) 512M + 128M 满血主线固件
          * **底层源码**: padavanonly / immortalwrt-mt798x-6.6 (Linux 6.6 主线内核 / OpenWrt 24.10)
          * **无线驱动**: 集成 237 大佬高功率驱动
          * **配置定制**: 内核集成 Docker 底层全依赖（后续支持外置存储安装）、集成网络硬件加速、内置科学上网。
          * **编译时间**: ${{ env.FILE_DATE }}
