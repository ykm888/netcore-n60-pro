name: Build OpenWrt for Netcore N60 Pro (ImmortalWrt 24.10 237驱动版)

on:
  workflow_dispatch:

env:
  # 核心调整：指向 padavanonly 的 mt798x 源码仓库（请根据你实际使用的24.10仓库地址核对，若使用的是原版请保持）
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x
  REPO_BRANCH: openwrt-24.10
  # 精准匹配你仓库根目录下的新配置文件名
  CONFIG_FILE: padavanonly-immortalwrt-mt798x-2410.config
  TZ: Asia/Shanghai

jobs:
  build:
    # 24.10 源码推荐使用 ubuntu-22.04 环境构建
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get update
        sudo apt-get -y purge --ignore-missing azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mysql* php* android*
        sudo apt-get -y autoremove --purge
        sudo apt-get -y install ack asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git glogg gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils rsync subversion swig texinfo u-boot-tools unzip upx wget xmlto xz-utils zlib1g-dev libutf8proc-dev
        sudo timedatectl set-timezone "${{ env.TZ }}"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone Source Code
      run: |
        df -hT $PWD
        git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} /workdir/openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        [ -f ${{ env.CONFIG_FILE }} ] && cp ${{ env.CONFIG_FILE }} openwrt/.config
        cd openwrt
        # 针对 24.10 引入新依赖的强制规范化
        make defconfig

    - name: Download Package Source
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      id: compile
      run: |
        cd openwrt
        echo "status=success"
        
        # 核心修复策略：24.10 的 mt_wifi 闭源高功率驱动更依赖上游工具链，必须先单线程喂饱它
        echo "==== 正在执行 24.10 底层工具链预构建 ===="
        make tools/compile -j$(nproc)
        make toolchain/compile -j$(nproc)
        
        echo "==== 正在单线程编译 237 高功率闭源无线驱动组件 ===="
        make package/mtk/drivers/mt_wifi/compile V=s -j1
        
        # 驱动通过后，全开全线程编译其余组件
        echo "==== 正在全线程编译 24.10 其余系统组件 ===="
        make -j$(nproc) || make -j1 V=s
        
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

    - name: Organize Files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload Firmware to Artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_24.10_firmware_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate Release Tag
      id: tag
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: |
        echo "release_tag=Netcore_N60_Pro_24.10_${{ env.FILE_DATE }}" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload Firmware to Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          ### 磊科 N60 Pro (MT7986核心) 硬改 512M + 128M 满血精简固件
          * **底层源码**: padavanonly / immortalwrt-mt798x (**OpenWrt 24.10 分支**)
          * **无线驱动**: 237 大佬闭源高功率驱动（完美激活满血 Wi-Fi 信号）
          * **功能与配置特性**:
            1. 自动适配仓库根目录下的 `padavanonly-immortalwrt-mt798x-2410.config`。
            2. 联发科原厂 **HNAT + WARP** 硬件直通双重加速（轻载跑满千兆/2.5G）。
            3. **Docker 内核全依赖内置**：系统只带内核底层，不带 Docker 程序实体，等刷完机插上外置存储（U盘/硬盘盒）后再行外装，完美保护 128M 闪存空间。
            4. 内置科学上网插件（SSR Plus+ / 默认集成满血 Xray 核心）。
          * **编译时间**: ${{ env.FILE_DATE }}
